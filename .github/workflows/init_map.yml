name: Initialize Map Data
on: workflow_dispatch # Allows you to click a button to run it

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install osmnx geopandas pandas
      - name: Run generator
        run: python src/generate_map.py
      - name: Commit and Push map
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 1. On prépare les changements
          git add data/metro_vancouver_map.geojson
          
          # 2. On commit localement (même si le push échoue après)
          git commit -m "Log: Update Metro Vancouver map" || echo "No changes to commit"
          
          # 3. On synchronise avec le serveur en mode rebase
          # Le rebase va mettre ton commit au-dessus des autres proprement
          git pull --rebase origin main
          
          # 4. On pousse enfin
          git push origin main
