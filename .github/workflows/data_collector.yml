name: Bus Data Pipeline

on:
  # schedule:
    #- cron: '*/30 * * * *' # Every 30 minutes
  workflow_dispatch:      # Manual trigger

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install requests geopandas shapely supabase pandas google-transit-interactive gtfs-realtime-bindings protobuf
      - name: Run collector
        env:
          TRANSLINK_API_KEY: ${{ secrets.TRANSLINK_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python src/fetch_bus_data.py
