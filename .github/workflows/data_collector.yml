name: Bus Data Pipeline

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests geopandas shapely supabase pandas gtfs-realtime-bindings protobuf==4.25.1
      - name: Run collector
        env:
          TRANSLINK_API_KEY: ${{ secrets.TRANSLINK_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python src/fetch_bus_data.py
